<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <span class="chat-title">Chat — Solicitud #{{ bookingId.slice(0, 8).toUpperCase() }}</span>
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="messages-container">

    <div *ngIf="messages.length === 0" class="empty-chat">
      <p>Inicia la conversación con la dependencia.</p>
    </div>

    <div *ngFor="let msg of messages"
         class="message-bubble"
         [class.own]="isOwn(msg)"
         [class.other]="!isOwn(msg)">
      <span class="sender-name" *ngIf="!isOwn(msg)">{{ msg.senderName }}</span>
      <div class="bubble-content">{{ msg.content }}</div>
      <span class="msg-time">{{ msg.createdAt | date:'shortTime' }}</span>
    </div>

    <!-- Ancla para auto-scroll al último mensaje -->
    <div #scrollAnchor></div>

  </div>
</ion-content>

<ion-footer class="ion-no-border">
  <div class="chat-input-bar">
    <ion-input
      [(ngModel)]="newMessage"
      placeholder="Escribe un mensaje..."
      class="chat-input"
      (keyup.enter)="sendMessage()">
    </ion-input>
    <button class="send-btn"
            (click)="sendMessage()"
            [disabled]="!newMessage.trim() || sending">
      <ion-icon name="send-outline"></ion-icon>
    </button>
  </div>
</ion-footer>
