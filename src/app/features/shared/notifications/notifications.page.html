<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">

    <!-- Panel blanco -->
    <div class="white-panel">
      <h2 class="panel-title">CENTRO DE NOTIFICACIONES</h2>

      <div class="notif-list">
        <div *ngFor="let notif of notifications"
             class="notif-row"
             [class.unread]="!notif.read">
          <div class="notif-icon-box">
            <ion-icon [name]="getIcon(notif.type)" [style.color]="getIconColor(notif.type)"></ion-icon>
          </div>
          <div class="notif-text">
            <span class="notif-title">{{ notif.title }}</span>
            <span class="notif-body">{{ notif.body }}</span>
          </div>
          <div class="unread-dot" *ngIf="!notif.read"></div>
        </div>

        <div *ngIf="notifications.length === 0" class="empty-notif">
          <ion-icon name="notifications-off-outline"></ion-icon>
          <p>Sin notificaciones</p>
        </div>
      </div>
    </div>

  </div>
</ion-content>
