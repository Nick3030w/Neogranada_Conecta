<ion-content class="notif-content">
  <div class="notif-wrapper">

    <!-- ── Zona azul: logo + botón salir + título ── -->
    <div class="notif-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="goBack()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>
      <h1 class="page-title">CENTRO DE<br>NOTIFICACIONES</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="notif-bottom">
      <div class="notif-panel">

        <!-- Cargando -->
        <div *ngIf="loading" class="empty-notif">
          <ion-spinner name="crescent" color="medium"></ion-spinner>
          <p>Cargando notificaciones...</p>
        </div>

        <!-- Lista de notificaciones -->
        <div class="notif-list" *ngIf="!loading">
          <div *ngFor="let notif of notifications"
               class="notif-row"
               [class.unread]="!notif.read"
               [class.approved]="notif.type === 'booking_approved'"
               [class.denied]="notif.type === 'booking_denied'">
            <div class="notif-icon-box">
              <ion-icon [name]="getIcon(notif.type)" class="notif-bell"></ion-icon>
            </div>
            <div class="notif-text">
              <span class="notif-title">{{ notif.title }}</span>
              <span class="notif-body">{{ notif.body }}</span>
              <span class="notif-time">{{ notif.createdAt | date:'d MMM, h:mm a' }}</span>
            </div>
          </div>

          <!-- Estado vacío -->
          <div *ngIf="notifications.length === 0" class="empty-notif">
            <ion-icon name="notifications-off-outline"></ion-icon>
            <p>Sin notificaciones</p>
          </div>
        </div>

      </div>
    </div>

  </div>
</ion-content>
