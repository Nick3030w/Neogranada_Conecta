<ion-content class="settings-content">
  <div class="settings-wrapper">

    <!-- ── Zona azul: logo + botón salir + ícono + título ── -->
    <div class="settings-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="goBack()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>

      <!-- Ícono engranaje dorado -->
      <div class="gear-box">
        <ion-icon name="construct" class="gear-icon"></ion-icon>
      </div>

      <h1 class="page-title">CONFIGURACIÓN</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="settings-bottom">
      <div class="settings-panel">

        <!-- Toggle silenciar notificaciones -->
        <div class="setting-row">
          <span class="setting-label">Silenciar  notificaciones</span>
          <ion-toggle
            [checked]="notificationsMuted"
            (ionChange)="toggleNotifications($event)"
            color="warning">
          </ion-toggle>
        </div>

        <!-- Botones de acción -->
        <button class="action-btn" (click)="goToProfile()">
          Ajustes de perfil
        </button>

        <button class="action-btn" (click)="changePassword()" [disabled]="loading">
          Cambiar contraseña
        </button>

        <button class="action-btn" (click)="logout()">
          Cerrar sesión
        </button>

        <!-- Botones CANCELAR / CONFIRMAR dentro del panel -->
        <div class="bottom-actions">
          <button class="btn-cancel" (click)="goBack()">CANCELAR</button>
          <button class="btn-confirm" (click)="goBack()">CONFIRMAR</button>
        </div>

      </div>

    </div>

  </div>
</ion-content>
