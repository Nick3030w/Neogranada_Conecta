<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="UMNG" class="nc-toolbar-logo"
           onerror="this.style.display='none'">
      <button class="nc-icon-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">

    <!-- Ícono engranaje dorado -->
    <div class="settings-icon-block">
      <div class="gear-box">
        <ion-icon name="settings-outline"></ion-icon>
      </div>
      <h2 class="page-title">CONFIGURACIÓN</h2>
    </div>

    <!-- Panel blanco -->
    <div class="white-panel">

      <!-- Toggle silenciar notificaciones -->
      <div class="setting-row">
        <span class="setting-label">Silenciar notificaciones</span>
        <ion-toggle
          [checked]="notificationsMuted"
          (ionChange)="toggleNotifications($event)"
          color="warning">
        </ion-toggle>
      </div>

      <!-- Toggle modo oscuro -->
      <div class="setting-row">
        <span class="setting-label">Modo oscuro</span>
        <ion-toggle
          [checked]="darkMode"
          (ionChange)="toggleDarkMode($event)"
          color="warning">
        </ion-toggle>
      </div>

      <div class="settings-divider"></div>

      <!-- Botones de acción -->
      <button class="settings-action-btn" (click)="goToProfile()">
        Ajustes de perfil
      </button>

      <button class="settings-action-btn" (click)="changePassword()" [disabled]="loading">
        Cambiar contraseña
      </button>

      <button class="settings-action-btn danger-btn" (click)="logout()">
        Cerrar sesión
      </button>

      <!-- Botones cancelar / confirmar -->
      <div class="bottom-actions">
        <button class="btn-cancel" (click)="goBack()">CANCELAR</button>
        <button class="btn-confirm" (click)="goBack()">CONFIRMAR</button>
      </div>

    </div>
  </div>
</ion-content>
