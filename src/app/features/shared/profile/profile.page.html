<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">

    <!-- Avatar -->
    <div class="avatar-block">
      <div class="avatar-circle">
        <ion-icon name="person-outline"></ion-icon>
      </div>
      <h2 class="profile-greeting">HOLA {{ user?.fullName?.toUpperCase() }}</h2>
    </div>

    <!-- Panel blanco -->
    <div class="white-panel">
      <form [formGroup]="form" (ngSubmit)="onSave()">

        <div class="field-block">
          <label class="field-label">Nombre:</label>
          <div class="field-input-row" [class.has-error]="form.get('fullName')!.invalid && form.get('fullName')!.touched">
            <ion-input formControlName="fullName" type="text" placeholder="Nombre completo"></ion-input>
          </div>
        </div>

        <div class="field-block">
          <label class="field-label">Correo:</label>
          <div class="field-input-row disabled-field">
            <ion-input [value]="user?.email" type="email" readonly></ion-input>
          </div>
        </div>

        <div class="field-block">
          <label class="field-label">Programa:</label>
          <div class="field-input-row" [class.has-error]="form.get('academicProgram')!.invalid && form.get('academicProgram')!.touched">
            <ion-input formControlName="academicProgram" type="text" placeholder="Programa académico"></ion-input>
          </div>
        </div>

        <div class="success-msg" *ngIf="successMessage">{{ successMessage }}</div>
        <div class="error-msg"   *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">GUARDAR</span>
        </button>

      </form>
    </div>
  </div>
</ion-content>
