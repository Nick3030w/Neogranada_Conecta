<ion-content class="nc-auth-bg">
  <div class="forgot-container nc-animate-in">

    <div class="forgot-header">
      <a routerLink="/auth/login" class="back-btn">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </a>
      <h1 class="nc-page-title">RECUPERAR<br>CONTRASEÑA</h1>
      <p class="nc-page-subtitle">Te enviaremos un enlace a tu correo institucional</p>
    </div>

    <div class="nc-panel forgot-panel">

      <!-- Éxito -->
      <div class="success-banner" *ngIf="successMessage">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <span>{{ successMessage }}</span>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!successMessage">

        <div class="field-group">
          <label class="nc-label">Correo institucional</label>
          <div class="input-wrapper" [class.input-error]="email.invalid && email.touched">
            <ion-icon name="mail-outline" class="input-icon"></ion-icon>
            <ion-input formControlName="email" type="email"
              placeholder="usuario@unimilitar.edu.co"
              autocomplete="email" inputmode="email">
            </ion-input>
          </div>
          <span class="nc-error-msg" *ngIf="email.invalid && email.touched">
            Ingresa un correo institucional válido.
          </span>
        </div>

        <div class="error-banner" *ngIf="errorMessage">
          <ion-icon name="alert-circle-outline"></ion-icon>
          <span>{{ errorMessage }}</span>
        </div>

        <ion-button type="submit" expand="block" class="nc-btn-primary" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent" slot="start"></ion-spinner>
          {{ loading ? 'Enviando...' : 'ENVIAR ENLACE' }}
        </ion-button>

      </form>

      <div class="back-login" *ngIf="successMessage">
        <a routerLink="/auth/login" class="nc-btn-secondary-link">Volver al inicio de sesión</a>
      </div>

    </div>
  </div>
</ion-content>
