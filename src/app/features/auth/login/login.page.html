<ion-content class="login-content">
  <div class="login-wrapper">

    <!-- ── Zona azul: logo + título ── -->
    <div class="login-header">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
      <h1 class="app-title">NEOGRANADA<br>CONECTA</h1>
    </div>

    <!-- ── Curva de transición azul → dorado ── -->
    <!-- El rect dorado llena el fondo; el path azul crea la curva cóncava -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Fondo dorado completo -->
        <rect width="375" height="56" fill="#8a6a00"/>
        <!-- Forma azul con borde inferior curvo (cóncavo hacia arriba) -->
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="login-bottom">
      <div class="login-panel">

        <form [formGroup]="form" (ngSubmit)="onLogin()">

          <!-- Selector de Rol (solo visual, sin funcionalidad) -->
          <div class="field-block">
            <label class="field-label">Seleccionar Rol</label>
            <div class="role-select-box" (click)="toggleRoleDropdown()">
              <ion-icon name="people-outline" class="role-icon"></ion-icon>
              <span class="role-value">{{ selectedRole }}</span>
              <ion-icon name="caret-down" class="caret-icon" [class.open]="showRoleDropdown"></ion-icon>
            </div>
            <!-- Dropdown de opciones -->
            <div class="role-dropdown" *ngIf="showRoleDropdown">
              <div class="role-option" (click)="selectRole('Estudiante')">
                <ion-icon name="people-outline"></ion-icon>
                <span>Estudiante</span>
              </div>
              <div class="role-option" (click)="selectRole('Administrador')">
                <ion-icon name="shield-outline"></ion-icon>
                <span>Administrador</span>
              </div>
            </div>
          </div>

          <!-- Correo electrónico -->
          <div class="field-block">
            <label class="field-label">Correo electronico</label>
            <div class="field-input-row" [class.has-error]="email.invalid && email.touched">
              <ion-icon name="mail-outline" class="field-icon"></ion-icon>
              <ion-input
                formControlName="email"
                type="email"
                autocomplete="email"
                inputmode="email">
              </ion-input>
            </div>
            <span class="field-error" *ngIf="email.invalid && email.touched">
              {{ email.errors?.['required'] ? 'Campo requerido.' : 'Correo inválido.' }}
            </span>
          </div>

          <!-- Contraseña -->
          <div class="field-block">
            <label class="field-label">Contraseña</label>
            <div class="field-input-row" [class.has-error]="password.invalid && password.touched">
              <ion-icon name="lock-closed-outline" class="field-icon"></ion-icon>
              <ion-input
                formControlName="password"
                type="password"
                autocomplete="current-password">
                <ion-input-password-toggle slot="end"></ion-input-password-toggle>
              </ion-input>
            </div>
            <span class="field-error" *ngIf="password.invalid && password.touched">
              Campo requerido.
            </span>
          </div>

          <!-- Error general -->
          <div class="error-box" *ngIf="errorMessage">
            <ion-icon name="alert-circle-outline"></ion-icon>
            {{ errorMessage }}
          </div>

          <!-- Botón verificar -->
          <button type="submit" class="btn-verificar" [disabled]="loading">
            <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
            <span *ngIf="!loading">VERIFICAR</span>
          </button>

        </form>

        <!-- Registro -->
        <div class="register-row">
          <span class="register-text">¿No tienes cuenta?</span>
          <a routerLink="/auth/register" class="register-link">Regístrate aquí</a>
        </div>

      </div>
    </div>

  </div>
</ion-content>
