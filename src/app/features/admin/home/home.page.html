<ion-content class="home-content">
  <div class="home-wrapper">

    <!-- ── Zona azul: logo + campana + título ── -->
    <div class="home-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <div class="header-top-actions">
          <button class="notif-btn" (click)="goToNotifications()">
            <ion-icon name="notifications" class="notif-icon"></ion-icon>
            <span class="notif-dot"></span>
          </button>
          <button class="logout-btn" (click)="logout()">
            <ion-icon name="log-out-outline" class="logout-icon"></ion-icon>
          </button>
        </div>
      </div>
      <h1 class="welcome-title">BIENVENIDO A<br>NEOGRANADA<br>CONECTA</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco con grid ── -->
    <div class="home-bottom">
      <div class="home-panel">
        <div class="menu-grid">

          <!-- CALENDARIO -->
          <button class="menu-tile" (click)="navigate('/admin/calendar')">
            <div class="tile-img-box tile-yellow">
              <ion-icon name="calendar" class="tile-icon"></ion-icon>
            </div>
            <span class="tile-label">CALENDARIO</span>
          </button>

          <!-- CONFIGURACIÓN -->
          <button class="menu-tile" (click)="navigate('/admin/settings')">
            <div class="tile-img-box tile-gray">
              <ion-icon name="construct" class="tile-icon"></ion-icon>
            </div>
            <span class="tile-label">CONFIGURACIÓN</span>
          </button>

          <!-- CONFIRMACIÓN -->
          <button class="menu-tile" (click)="navigate('/admin/confirmation')">
            <div class="tile-img-box tile-yellow">
              <ion-icon name="checkmark-circle" class="tile-icon tile-icon-green"></ion-icon>
            </div>
            <span class="tile-label">CONFIRMACIÓN</span>
          </button>

          <!-- PERFIL -->
          <button class="menu-tile" (click)="navigate('/admin/profile')">
            <div class="tile-img-box tile-gray">
              <ion-icon name="person-circle" class="tile-icon"></ion-icon>
            </div>
            <span class="tile-label">PERFIL</span>
          </button>

        </div>
      </div>
    </div>

  </div>
</ion-content>
