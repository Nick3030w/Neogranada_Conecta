<ion-content class="cal-content">
  <div class="cal-wrapper">

    <!-- ── Zona azul: logo + botón salir + título ── -->
    <div class="cal-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="goBack()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>
      <h1 class="page-title">CALENDARIO</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="cal-bottom">
      <div class="cal-panel">

        <!-- Calendario con fondo salmón -->
        <div class="calendar-box">

          <!-- Navegación mes/año con selects nativos -->
          <div class="month-nav">
            <button class="nav-arrow" (click)="prevMonth()">
              <ion-icon name="chevron-back-outline"></ion-icon>
            </button>
            <div class="selects-row">
              <select class="month-select" (change)="onMonthChange($event)">
                <option *ngFor="let m of monthOptions; let i = index"
                        [value]="i"
                        [selected]="i === currentDate.getMonth()">{{ m }}</option>
              </select>
              <select class="year-select" (change)="onYearChange($event)">
                <option *ngFor="let y of yearOptions"
                        [value]="y"
                        [selected]="y === currentDate.getFullYear()">{{ y }}</option>
              </select>
            </div>
            <button class="nav-arrow" (click)="nextMonth()">
              <ion-icon name="chevron-forward-outline"></ion-icon>
            </button>
          </div>

          <!-- Cabecera días -->
          <div class="cal-grid">
            <div class="cal-day-header" *ngFor="let d of dayHeaders">{{ d }}</div>

            <!-- Días -->
            <div *ngFor="let day of calendarDays"
                 class="cal-day"
                 [class.empty]="day === null"
                 [class.today]="isToday(day)"
                 [class.has-booking]="hasBooking(day)"
                 [class.other-month]="isOtherMonth(day)">
              <span *ngIf="day !== null">{{ displayDay(day) }}</span>
              <span *ngIf="hasBooking(day)" class="booking-dot"></span>
            </div>
          </div>

        </div>
        <!-- fin calendar-box -->

        <!-- Barra préstamos totales -->
        <div class="bookings-bar">
          <div class="bookings-label-pill">Prestamos totales</div>
          <div class="bookings-count-pill">{{ totalBookings.toString().padStart(2,'0') }}</div>
        </div>

      </div>
    </div>

  </div>
</ion-content>
