<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="UMNG" class="nc-toolbar-logo"
           onerror="this.style.display='none'">
      <button class="nc-icon-btn" (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">
    <div class="white-panel">
      <h2 class="panel-title">CALENDARIO</h2>

      <!-- Navegación mes -->
      <div class="month-nav">
        <button class="nav-arrow" (click)="prevMonth()">
          <ion-icon name="chevron-back-outline"></ion-icon>
        </button>
        <div class="month-selector">
          <span class="month-label">{{ monthName }}</span>
          <span class="year-label">{{ currentYear }}</span>
        </div>
        <button class="nav-arrow" (click)="nextMonth()">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </button>
      </div>

      <!-- Cabecera días -->
      <div class="cal-grid">
        <div class="cal-day-header" *ngFor="let d of dayHeaders">{{ d }}</div>

        <!-- Días del mes -->
        <div *ngFor="let day of calendarDays"
             class="cal-day"
             [class.empty]="!day"
             [class.today]="isToday(day)"
             [class.has-booking]="hasBooking(day)">
          <span *ngIf="day">{{ day }}</span>
        </div>
      </div>

      <!-- Contador préstamos -->
      <div class="bookings-bar">
        <span class="bookings-label">Préstamos totales</span>
        <span class="bookings-count">{{ totalBookings.toString().padStart(2,'0') }}</span>
      </div>

    </div>
  </div>
</ion-content>
