<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">
    <div class="white-panel">
      <h2 class="panel-title">ESTADO DE<br>CONFIRMACIÓN</h2>

      <!-- Lista de solicitudes pendientes -->
      <div *ngFor="let booking of pendingBookings" class="booking-card">

        <!-- ID de solicitud -->
        <div class="request-id-row">
          <span class="request-id">Solicitud #{{ booking.id }}</span>
        </div>

        <!-- Detalle -->
        <div class="booking-detail-row" *ngIf="booking.status !== 'pendiente'">
          <span class="detail-label">Estudiante:</span>
          <span class="detail-value">{{ booking.studentName }}</span>
        </div>
        <div class="booking-detail-row">
          <span class="detail-label">Recurso:</span>
          <span class="detail-value">{{ booking.resourceName }}</span>
        </div>
        <div class="booking-detail-row">
          <span class="detail-label">Fecha:</span>
          <span class="detail-value">{{ booking.date }} — {{ booking.time }}</span>
        </div>

        <!-- Botones DENEGAR / ACEPTAR -->
        <div class="action-btns" *ngIf="booking.status === 'pendiente'">
          <button class="btn-deny" (click)="deny(booking)">DENEGAR</button>
          <button class="btn-accept" (click)="approve(booking)">ACEPTAR</button>
        </div>

        <!-- Estado aprobado/denegado -->
        <div class="status-badge approved" *ngIf="booking.status === 'aprobada'">✓ Solicitud aprobada</div>
        <div class="status-badge denied"   *ngIf="booking.status === 'denegada'">✗ Solicitud denegada</div>

        <!-- Botón continuar -->
        <button class="btn-continue" (click)="goBack()">CONTINUAR</button>

        <!-- Chat -->
        <button class="btn-chat" (click)="openChat(booking.id)">
          <ion-icon name="chatbubbles-outline"></ion-icon>
          Chat con la dependencia
        </button>

      </div>

      <!-- Sin solicitudes -->
      <div *ngIf="pendingBookings.length === 0" class="empty-state">
        <ion-icon name="checkmark-circle-outline"></ion-icon>
        <p>No hay solicitudes pendientes</p>
      </div>

    </div>
  </div>
</ion-content>
