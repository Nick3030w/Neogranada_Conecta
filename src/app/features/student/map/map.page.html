<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">
    <div class="white-panel">
      <h2 class="panel-title">MAPA</h2>

      <!-- Buscador -->
      <div class="search-row">
        <ion-icon name="search-outline" class="search-icon"></ion-icon>
        <input
          type="text"
          [(ngModel)]="searchQuery"
          placeholder="Buscar bloque o sede..."
          class="search-input">
      </div>

      <!-- Lista de bloques -->
      <div class="blocks-list">
        <div *ngFor="let block of filteredBlocks" class="block-row">
          <div class="block-icon-box">
            <ion-icon name="business-outline"></ion-icon>
          </div>
          <div class="block-info">
            <span class="block-name">{{ block.name }}</span>
            <span class="block-desc">{{ block.description }}</span>
          </div>
          <ion-icon name="chevron-forward-outline" class="block-arrow"></ion-icon>
        </div>

        <div *ngIf="filteredBlocks.length === 0" class="empty-state">
          <p>No se encontraron bloques o sedes con ese nombre.</p>
        </div>
      </div>

    </div>
  </div>
</ion-content>
