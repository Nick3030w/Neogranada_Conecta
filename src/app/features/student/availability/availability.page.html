<ion-content class="avail-content">
  <div class="avail-wrapper">

    <!-- ── Zona azul: logo + botón salir + título ── -->
    <div class="avail-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="logout()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>
      <h1 class="page-title">ESTADO DE<br>DISPONIBILIDAD</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="avail-bottom">
      <div class="avail-panel">

        <!-- Pill "Categoría seleccionada" -->
        <div class="selected-pill">
          <span>Artículo seleccionado</span>
        </div>

        <!-- Imagen / ícono de la categoría -->
        <div class="item-img-box">
          <img [src]="categoryImageUrl"
               [alt]="categoryId"
               class="item-img"
               (error)="onImgError($event)">
          <div class="item-img-fallback" [style.display]="showFallback ? 'flex' : 'none'">
            <ion-icon [name]="categoryIcon" class="fallback-icon"></ion-icon>
          </div>
        </div>

        <!-- ── Spinner mientras carga ── -->
        <div class="loading-area" *ngIf="loading">
          <ion-spinner name="crescent" class="load-spinner"></ion-spinner>
          <span class="load-text">Consultando disponibilidad...</span>
        </div>

        <!-- ── CATEGORÍA RESERVABLE ── -->
        <ng-container *ngIf="!loading && isBookable">

          <!-- Badge: hay recursos disponibles → botón activo -->
          <button class="availability-badge available"
                  *ngIf="hasAvailable"
                  (click)="goToBooking()">
            <ion-icon name="calendar-outline" class="badge-icon"></ion-icon>
            <span>Consultar disponibilidad</span>
          </button>

          <!-- Badge: sin recursos disponibles → deshabilitado -->
          <div class="availability-badge unavailable" *ngIf="!hasAvailable">
            <ion-icon name="close-circle-outline" class="badge-icon"></ion-icon>
            <span>Sin disponibilidad por ahora</span>
          </div>

          <!-- Contador de recursos disponibles -->
          <p class="avail-count" *ngIf="hasAvailable">
            {{ availableCount }} {{ availableCount === 1 ? 'recurso disponible' : 'recursos disponibles' }}
          </p>

        </ng-container>

        <!-- ── CATEGORÍA INFORMATIVA (biblioteca / base_datos) ── -->
        <ng-container *ngIf="!loading && !isBookable">
          <div class="info-box">
            <ion-icon name="information-circle-outline" class="info-icon"></ion-icon>
            <p class="info-text">{{ infoText }}</p>
          </div>
        </ng-container>

        <!-- Botón VOLVER A CATÁLOGO -->
        <button class="btn-back" (click)="goBack()">VOLVER AL CATÁLOGO</button>

      </div>
    </div>

  </div>
</ion-content>
