<ion-content class="tutorial-content">
  <div class="tutorial-wrapper">

    <!-- ── Zona azul: logo + botón salir + título ── -->
    <div class="tutorial-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="goBack()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>
      <h1 class="page-title">VIDEO TUTORIAL DE USO</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="tutorial-bottom">
      <div class="tutorial-panel">

        <!-- Reproductor de video -->
        <div class="video-box" (click)="openVideo()">
          <!-- Thumbnail: logo UMNG como placeholder -->
          <img src="assets/images/logo-umng.png"
               alt="Video tutorial"
               class="video-thumbnail">
          <!-- Overlay con ícono play -->
          <div class="video-overlay">
            <ion-icon name="play-circle" class="play-icon"></ion-icon>
          </div>
          <!-- Tiempo -->
          <div class="video-time">{{ currentTime }} / {{ totalTime }}</div>
        </div>

        <!-- Barra de progreso roja -->
        <div class="progress-track">
          <div class="progress-fill" [style.width.%]="progressPercent"></div>
          <div class="progress-thumb" [style.left.%]="progressPercent"></div>
        </div>

        <!-- Botones like / dislike -->
        <div class="rating-row">
          <!-- Dislike -->
          <button class="rate-btn dislike-btn"
                  [class.active]="liked === false"
                  (click)="rate(false)">
            <ion-icon name="thumbs-down" class="rate-icon"></ion-icon>
          </button>

          <!-- Like -->
          <button class="rate-btn like-btn"
                  [class.active]="liked === true"
                  (click)="rate(true)">
            <ion-icon name="thumbs-up" class="rate-icon"></ion-icon>
          </button>
        </div>

      </div>
    </div>

  </div>
</ion-content>
