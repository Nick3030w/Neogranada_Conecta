<ion-header class="ion-no-border"><ion-toolbar><div class="toolbar-content"><button class="icon-btn" (click)="goBack()"><ion-icon name="arrow-back-outline"></ion-icon></button><img src="assets/images/logo-umng.png" alt="UMNG" class="toolbar-logo" onerror="this.style.display='none'"><button class="icon-btn" (click)="logout()"><ion-icon name="log-out-outline"></ion-icon></button></div></ion-toolbar></ion-header>
<ion-content><div class="page-container nc-animate-in"><div class="nc-panel"><h2 class="panel-title">VIDEO TUTORIAL DE USO</h2>
<div class="video-wrapper"><div class="video-placeholder"><img src="assets/images/logo-umng.png" alt="UMNG" class="video-logo" onerror="this.style.display='none'"><ion-icon name="play-circle-outline" class="play-icon"></ion-icon></div></div>
<div class="progress-bar"><div class="progress-fill"></div></div>
<div class="rating-section"><button class="rate-btn" [class.active]="liked === false" (click)="rate(false)"><ion-icon name="thumbs-down-outline"></ion-icon></button><button class="rate-btn" [class.active]="liked === true" (click)="rate(true)"><ion-icon name="thumbs-up-outline"></ion-icon></button></div>
</div></div></ion-content>
