<ion-content class="conf-content">
  <div class="conf-wrapper">

    <!-- ── Zona azul: logo + botón salir + título ── -->
    <div class="conf-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="goBack()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>
      <h1 class="page-title">ESTADO DE<br>CONFIRMACIÓN</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="conf-bottom">
      <div class="conf-panel">

        <!-- Pill de estado superior -->
        <div class="status-pill top-pill">
          <span *ngIf="status === 'pendiente'">Procesando solicitud</span>
          <span *ngIf="status === 'aprobada'">Solicitud aprobada</span>
          <span *ngIf="status === 'denegada'">Solicitud denegada</span>
        </div>

        <!-- Spinner animado (pendiente) -->
        <div class="spinner-area" *ngIf="status === 'pendiente'">
          <div class="custom-spinner">
            <div class="spinner-blade" *ngFor="let b of blades; let i = index"
                 [style.transform]="'rotate(' + (i * 45) + 'deg)'"
                 [style.animation-delay]="'-' + ((8 - i) * 0.125) + 's'">
            </div>
          </div>
        </div>

        <!-- Ícono aprobada -->
        <div class="status-icon-area" *ngIf="status === 'aprobada'">
          <div class="status-circle success">
            <ion-icon name="checkmark-outline"></ion-icon>
          </div>
        </div>

        <!-- Ícono denegada -->
        <div class="status-icon-area" *ngIf="status === 'denegada'">
          <div class="status-circle danger">
            <ion-icon name="close-outline"></ion-icon>
          </div>
        </div>

        <!-- Pill "Solicitud confirmada / denegada" -->
        <div class="status-pill confirmed-pill" [class.denied-pill]="status === 'denegada'">
          <span *ngIf="status === 'pendiente'">Solicitud confirmada</span>
          <span *ngIf="status === 'aprobada'">Solicitud confirmada</span>
          <span *ngIf="status === 'denegada'">Solicitud denegada</span>
        </div>

        <!-- Botón Chat con la dependencia -->
        <button class="btn-chat" (click)="goToChat()">
          <div class="chat-icon-box">
            <ion-icon name="chatbubble-outline" class="chat-icon"></ion-icon>
          </div>
          <span>Chat con la dependencia</span>
        </button>

      </div>
    </div>

  </div>
</ion-content>
