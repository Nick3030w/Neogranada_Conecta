<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">
    <div class="white-panel">
      <h2 class="panel-title">ESTADO DE<br>CONFIRMACIÓN</h2>

      <!-- ID solicitud -->
      <div class="request-id-row">
        <span class="request-id">Solicitud #{{ bookingId }}</span>
      </div>

      <!-- Estado visual -->
      <div class="status-area">

        <!-- Pendiente: spinner -->
        <ng-container *ngIf="status === 'pendiente'">
          <ion-spinner name="crescent" class="status-spinner"></ion-spinner>
          <p class="status-text pending">Procesando solicitud...</p>
        </ng-container>

        <!-- Aprobada -->
        <ng-container *ngIf="status === 'aprobada'">
          <div class="status-icon-circle success">
            <ion-icon name="checkmark-outline"></ion-icon>
          </div>
          <p class="status-text success">Solicitud confirmada</p>
        </ng-container>

        <!-- Denegada -->
        <ng-container *ngIf="status === 'denegada'">
          <div class="status-icon-circle danger">
            <ion-icon name="close-outline"></ion-icon>
          </div>
          <p class="status-text danger">Solicitud denegada</p>
        </ng-container>

      </div>

      <!-- Botón continuar -->
      <button class="btn-continue" (click)="goHome()">CONTINUAR</button>

      <!-- Chat con dependencia -->
      <button class="btn-chat" (click)="goToChat()">
        <ion-icon name="chatbubbles-outline"></ion-icon>
        Chat con la dependencia
      </button>

    </div>
  </div>
</ion-content>
