<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">
    <div class="white-panel">
      <h2 class="panel-title">AGENDAMIENTO</h2>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">

        <!-- Fecha y Hora en fila -->
        <div class="row-fields">
          <div class="field-block half">
            <label class="field-label">Fecha</label>
            <div class="field-select-row" [class.has-error]="date.invalid && date.touched">
              <ion-icon name="calendar-outline" class="field-icon"></ion-icon>
              <ion-input formControlName="date" type="date" [min]="today" style="min-width:0"></ion-input>
            </div>
            <span class="field-error" *ngIf="date.invalid && date.touched">Requerido.</span>
          </div>

          <div class="field-block half">
            <label class="field-label">Hora</label>
            <div class="field-select-row" [class.has-error]="time.invalid && time.touched">
              <ion-icon name="time-outline" class="field-icon"></ion-icon>
              <ion-input formControlName="time" type="time" style="min-width:0"></ion-input>
            </div>
            <span class="field-error" *ngIf="time.invalid && time.touched">Requerido.</span>
          </div>
        </div>

        <!-- Servicio -->
        <div class="field-block">
          <label class="field-label">Servicio</label>
          <div class="field-select-row" [class.has-error]="service.invalid && service.touched">
            <ion-select formControlName="service"
              placeholder="Selecciona el servicio"
              interface="action-sheet"
              cancelText="Cancelar">
              <ion-select-option *ngFor="let s of services" [value]="s">{{ s }}</ion-select-option>
            </ion-select>
          </div>
          <span class="field-error" *ngIf="service.invalid && service.touched">Selecciona un servicio.</span>
        </div>

        <!-- Observaciones -->
        <div class="field-block">
          <label class="field-label">Observaciones</label>
          <div class="field-textarea-row">
            <ion-textarea
              formControlName="observations"
              placeholder="Escribe tus observaciones aquí..."
              rows="4"
              auto-grow="false">
            </ion-textarea>
          </div>
        </div>

        <!-- Error general -->
        <div class="error-box" *ngIf="errorMessage">{{ errorMessage }}</div>

        <!-- Botón continuar -->
        <button type="submit" class="btn-primary" [disabled]="loading">
          <ion-spinner *ngIf="loading" name="crescent"></ion-spinner>
          <span *ngIf="!loading">CONTINUAR</span>
        </button>

      </form>
    </div>
  </div>
</ion-content>
