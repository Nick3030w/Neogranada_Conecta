<ion-content class="catalog-content">
  <div class="catalog-wrapper">

    <!-- ── Zona azul: logo + botón salir + título ── -->
    <div class="catalog-header">
      <div class="header-top-row">
        <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="logo-img">
        <button class="back-btn" (click)="goBack()">
          <ion-icon name="log-out-outline" class="back-icon"></ion-icon>
        </button>
      </div>
      <h1 class="page-title">CATÁLOGO</h1>
    </div>

    <!-- ── Curva SVG azul → dorado ── -->
    <div class="curve-divider">
      <svg viewBox="0 0 375 56" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="375" height="56" fill="#8a6a00"/>
        <path d="M0,0 L375,0 L375,20 Q187,56 0,20 Z" fill="#1a2e5a"/>
      </svg>
    </div>

    <!-- ── Zona dorada: panel blanco ── -->
    <div class="catalog-bottom">
      <div class="catalog-panel">

        <!-- Panel más demandados (desplegable) -->
        <div class="ranking-panel">
          <button class="ranking-header" (click)="toggleRanking()">
            <ion-icon name="trending-up-outline" class="ranking-icon"></ion-icon>
            <span class="ranking-title">Más demandados</span>
            <ion-icon
              [name]="rankingOpen ? 'chevron-up-outline' : 'chevron-down-outline'"
              class="ranking-chevron">
            </ion-icon>
          </button>
          <div class="ranking-list" [class.ranking-list--open]="rankingOpen">
            <div *ngFor="let cat of categories; let i = index" class="ranking-item">
              <span class="rank-number" [class.rank-gold]="i === 0" [class.rank-silver]="i === 1" [class.rank-bronze]="i === 2">
                {{ i + 1 }}
              </span>
              <ion-icon [name]="cat.icon" class="rank-cat-icon"></ion-icon>
              <span class="rank-label">{{ cat.label }}</span>
            </div>
          </div>
        </div>

        <div class="catalog-grid">

          <button *ngFor="let cat of categories; let i = index"
                  class="catalog-card"
                  (click)="selectCategory(cat.id)">
            <div class="card-img-box">
              <!-- Foto real si existe, fallback con ícono -->
              <img [src]="cat.imageUrl"
                   [alt]="cat.label"
                   class="card-img"
                   (error)="onImgError($event, cat)">
              <div class="card-img-fallback" [style.display]="cat.showFallback ? 'flex' : 'none'">
                <ion-icon [name]="cat.icon" class="fallback-icon"></ion-icon>
              </div>
            </div>
            <span class="card-label">{{ cat.label }}</span>
          </button>

        </div>
      </div>
    </div>

  </div>
</ion-content>
