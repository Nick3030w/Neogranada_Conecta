<ion-header class="ion-no-border nc-header">
  <ion-toolbar>
    <div class="nc-toolbar">
      <img src="assets/images/logo-umng.png" alt="Logo UMNG" class="nc-toolbar-logo">
      <button class="nc-icon-btn" (click)="goBack()">
        <ion-icon name="log-out-outline"></ion-icon>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content class="page-content">
  <div class="page-wrapper nc-animate-in">
    <div class="white-panel">
      <h2 class="panel-title">CATÁLOGO</h2>

      <div class="catalog-grid">
        <button *ngFor="let cat of categories"
                class="catalog-card"
                (click)="selectCategory(cat.id)">
          <div class="card-img-wrapper">
            <img [src]="cat.imageUrl" [alt]="cat.label"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="card-emoji-fallback" style="display:none">{{ cat.emoji }}</div>
          </div>
          <span class="card-label">{{ cat.label }}</span>
        </button>
      </div>

    </div>
  </div>
</ion-content>
